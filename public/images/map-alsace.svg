<svg viewBox="0 0 300 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0A2560"/>
      <stop offset="100%" stop-color="#1448A8"/>
    </linearGradient>
    <!-- Bas-Rhin : teal clair -->
    <linearGradient id="bas-rhin-fill" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4DCFB0" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#00C896" stop-opacity="0.35"/>
    </linearGradient>
    <!-- Haut-Rhin : teal plus soutenu -->
    <linearGradient id="haut-rhin-fill" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00C896" stop-opacity="0.65"/>
      <stop offset="100%" stop-color="#009E78" stop-opacity="0.45"/>
    </linearGradient>
    <radialGradient id="red-halo" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FF3B30" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#FF3B30" stop-opacity="0"/>
    </radialGradient>
    <pattern id="dots" width="18" height="18" patternUnits="userSpaceOnUse">
      <circle cx="9" cy="9" r="0.8" fill="rgba(255,255,255,0.06)"/>
    </pattern>
    <filter id="dept-shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <filter id="dot-glow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="clip"><rect width="300" height="500" rx="24"/></clipPath>
  </defs>

  <!-- Fond -->
  <rect width="300" height="500" fill="url(#bg)" rx="24"/>
  <rect width="300" height="500" fill="url(#dots)" clip-path="url(#clip)"/>

  <!--
    ══════════════════════════════════════════════
    BAS-RHIN (département nord, plus clair)
    Caractéristique : bump nord-ouest (Wissembourg)
    ══════════════════════════════════════════════
  -->
  <path
    d="
      M 74,52
      L 58,38 L 48,22 L 60,10 L 88,4
      L 125,2 L 165,6 L 200,14
      L 238,26
      C 252,38 258,62 260,90
      C 262,118 261,148 260,175
      L 258,205
      L 235,218 L 205,226 L 170,230
      L 140,232 L 108,230
      L 84,228
      C 78,218 74,205 72,190
      C 70,172 69,152 70,130
      C 70,108 71,86 73,66
      Z
    "
    fill="url(#bas-rhin-fill)"
    stroke="#00C896"
    stroke-width="1.8"
    stroke-linejoin="round"
    filter="url(#dept-shadow)"
  />

  <!--
    ══════════════════════════════════════════════
    HAUT-RHIN (département sud, teal plus foncé)
    Caractéristique : protrusion ouest prononcée
    ══════════════════════════════════════════════
  -->
  <path
    d="
      M 84,228
      L 108,230 L 140,232 L 170,230 L 205,226 L 235,218 L 258,205
      L 260,232
      C 262,260 262,288 260,315
      C 258,342 252,368 242,392
      C 232,416 218,440 200,458
      C 185,472 165,480 145,478
      C 125,476 108,465 92,450
      C 78,436 65,418 52,398
      C 38,376 26,352 24,328
      C 20,305 28,282 44,268
      C 56,258 72,248 84,242
      Z
    "
    fill="url(#haut-rhin-fill)"
    stroke="#00C896"
    stroke-width="1.8"
    stroke-linejoin="round"
    filter="url(#dept-shadow)"
  />

  <!-- Séparateur Bas-Rhin / Haut-Rhin -->
  <line x1="84" y1="228" x2="258" y2="205"
        stroke="rgba(255,255,255,0.25)" stroke-width="1.5" stroke-dasharray="5 4"/>

  <!-- Rhin (frontière est, ligne indicative) -->
  <path d="M 238,26 C 252,80 260,150 260,175 L 258,205 L 260,232 C 262,280 260,340 242,392"
        fill="none" stroke="rgba(77,207,176,0.4)" stroke-width="1.5" stroke-dasharray="6 4"/>

  <!-- ══ Labels départements ══ -->
  <text x="165" y="105" fill="rgba(255,255,255,0.45)" font-size="13"
        font-family="'DM Sans',sans-serif" text-anchor="middle" letter-spacing="2" font-weight="600">BAS-RHIN</text>

  <text x="152" y="360" fill="rgba(255,255,255,0.45)" font-size="13"
        font-family="'DM Sans',sans-serif" text-anchor="middle" letter-spacing="2" font-weight="600">HAUT-RHIN</text>

  <!-- ══ Strasbourg ══ -->
  <circle cx="242" cy="100" r="5" fill="rgba(255,255,255,0.9)"/>
  <circle cx="242" cy="100" r="9" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
  <text x="234" y="91" fill="rgba(255,255,255,0.7)" font-size="10.5"
        font-family="'DM Sans',sans-serif" text-anchor="end">Strasbourg</text>

  <!-- ══ Colmar ══ -->
  <circle cx="226" cy="268" r="4" fill="rgba(255,255,255,0.75)"/>
  <text x="218" y="265" fill="rgba(255,255,255,0.6)" font-size="10"
        font-family="'DM Sans',sans-serif" text-anchor="end">Colmar</text>

  <!-- ══ MULHOUSE — point rouge animé ══ -->
  <!-- Halos pulsants -->
  <circle cx="148" cy="400" r="32" fill="url(#red-halo)">
    <animate attributeName="r" values="20;36;20" dur="2.2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="1;0;1" dur="2.2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="148" cy="400" r="18" fill="rgba(255,59,48,0.2)">
    <animate attributeName="r" values="12;22;12" dur="2.2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.8;0;0.8" dur="2.2s" repeatCount="indefinite"/>
  </circle>
  <!-- Dot principal -->
  <circle cx="148" cy="400" r="9" fill="#FF3B30" filter="url(#dot-glow)"/>
  <circle cx="148" cy="400" r="4.5" fill="white"/>

  <!-- Label Mulhouse -->
  <text x="148" y="430" fill="white" font-size="13.5"
        font-family="'Syne',sans-serif" text-anchor="middle" font-weight="700">Mulhouse</text>
  <text x="148" y="445" fill="rgba(255,255,255,0.55)" font-size="9"
        font-family="'DM Sans',sans-serif" text-anchor="middle" letter-spacing="0.8">Base d'intervention</text>

  <!-- ══ Badge Zone d'intervention ══ -->
  <rect x="16" y="15" width="164" height="25" rx="12.5"
        fill="rgba(0,200,150,0.18)" stroke="rgba(0,200,150,0.45)" stroke-width="1"/>
  <circle cx="29" cy="27.5" r="4" fill="#00C896"/>
  <text x="98" y="31.5" fill="#4DCFB0" font-size="9"
        font-family="'DM Sans',sans-serif" text-anchor="middle"
        font-weight="700" letter-spacing="1.5">ZONE D'INTERVENTION</text>

  <!-- ══ Cadre décoratif ══ -->
  <rect x="4" y="4" width="292" height="492" rx="22"
        fill="none" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>

  <!-- Étoiles déco -->
  <circle cx="280" cy="30" r="1.2" fill="rgba(255,255,255,0.2)"/>
  <circle cx="268" cy="42" r="0.8" fill="rgba(255,255,255,0.15)"/>
  <circle cx="18" cy="460" r="1.2" fill="rgba(255,255,255,0.18)"/>
  <circle cx="285" cy="450" r="1" fill="rgba(255,255,255,0.15)"/>
</svg>
